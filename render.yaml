services:
  - type: web
    name: project-c
    runtime: node
    region: ohio
    plan: free
    branch: main
    rootDir: .
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/trpc/ping
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: APP_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: COMPOSIO_API_KEY
        sync: false
      - key: A2E_API_KEY
        sync: false
      - key: STEEL_API_KEY
        sync: false
      - key: FIRECRAWL_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
